name: Flask CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          source venv/bin/activate
          # Replace with your actual test command (e.g., pytest or python -m unittest)
          python -m unittest discover tests

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.31.40.19  # Note: Use Public IP if GitHub cannot see your Private IP
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            if [ ! -d ".git" ]; then
                git clone https://github.com/arunsdpr-wq/cicd-pipeline-flaskwebapp.git .
            else
                git pull origin main
            fi
            python3 -m venv venv
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart flaskapp || echo "Service not found, starting manually"
            nohup ./venv/bin/python app.py > /dev/null 2>&1 &
